<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="Timer">
        Digital Clock
    </div>
    <div class="clock">
        <div class="hour">
            <div class="hourtext">Hour</div>
            <div class="hourhand"></div>
        </div>
        <div class="minute">
            <div class="minutetext">Minute</div>
            <div class="minutehand"></div>
        </div>
        <div class="second">
            <div class="secondtext">Second</div>
            <div class="secondhand"></div>
        </div>
    </div>
    <div class="Date">
        <span id="date"></span>
    </div>
    <div class="Day">
        <span id="day"></span>
    </div>
    <script src="script.js"></script>
</body>
</html>
